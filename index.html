<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Planillas de Despacho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <style>
        .dispatch-page {
            width: 210mm;
            min-height: 297mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .dispatch-page > table { flex: 1; width: 100%; border-collapse: collapse; }
        .filler-row { height: 100%; }

        @media print {
            @page { size: A4; margin: 6mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            main, .dispatch-preview-container {
                margin: 0 !important; padding: 0 !important;
                box-shadow: none !important; border: none !important;
            }
            .dispatch-page {
                page-break-after: always;
                box-shadow: none !important; border: none !important;
                margin: 0 !important; padding: 6mm !important;
                height: 297mm;
            }
            .dispatch-page:last-of-type { page-break-after: avoid; }
            table { width: 100% !important; }
        }
    </style>
</head>
<body class="bg-[#152C47]">
<div id="root"></div>
<script type="text/babel" data-type="module">
    const { createClient } = supabase;
    const supabaseClient = createClient(
        'https://uemerxsdwrygafqmwvdz.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlbWVyeHNkd3J5Z2FmcW13dmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEyNDY2MjgsImV4cCI6MjA3NjgyMjYyOH0.F35Dj1qUxPDQlSdz82KAeH6wGIz_uDYCZpoeJs0LC-c'
    );
    const LOGO_URL = 'https://uemerxsdwrygafqmwvdz.supabase.co/storage/v1/object/sign/imagenes/logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9jNzVkZWIxYi00MWYyLTRjN2QtYWQ2Ni0wN2YyNDU1YzNlYTUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJpbWFnZW5lcy9sb2dvLnBuZyIsImlhdCI6MTc2MTc0NzQ4MiwiZXhwIjoxNzkzMjgzNDgyfQ.ZbKEeYvifiVXIDWlXRek6MZnJY2QS-P3ILYz2MVuCTc';

    // ── VERSION INFO (línea 65-66) ─────────────────────────────────────────
    // Para actualizar: cambia FORMAT_VERSION y FORMAT_DATE cuando procesos lo solicite.
    const FORMAT_VERSION = '2';
    const FORMAT_DATE    = '5/05/2026';  // ← ACTUALIZAR AQUÍ

    const AUDIT_PER_PAGE  = 13;
    const ROW_HEIGHT_CM   = 5;
    const ROW_HEIGHT_PX   = Math.round(ROW_HEIGHT_CM * 37.795);
    // HEADER_PX: overhead de logo+vehículo+encabezados de columna (~165px).
    // Ajustar si el encabezado cambia de tamaño significativamente.
    const HEADER_PX       = 165;
    const PAGE_BUDGET_PX  = Math.round(297 * 3.7795) - HEADER_PX - 20;

    // Fuente fija intermedia para N° Entrega (no depende del conteo)
    const DELIVERY_FONT   = '8px';

    function paginateRows(rows) {
        const pages = [];
        let page = [], used = 0;
        for (const row of rows) {
            if (used + ROW_HEIGHT_PX > PAGE_BUDGET_PX && page.length > 0) {
                pages.push(page); page = []; used = 0;
            }
            page.push(row);
            used += ROW_HEIGHT_PX;
        }
        if (page.length > 0) pages.push(page);
        return pages;
    }

    // ── SHARED STYLES ─────────────────────────────────────────────────────
    const hS = { fontSize:'9px', fontWeight:'bold', padding:'2px 4px', lineHeight:'1.3', whiteSpace:'nowrap' };
    const vS = { fontSize:'9px', padding:'2px 4px', overflow:'hidden', textOverflow:'ellipsis' };

    // ── CHEVRON ICON ──────────────────────────────────────────────────────
    const ChevronDown = (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" {...p}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
    );

    // ── PAGE HEADER ───────────────────────────────────────────────────────
    // showHeader=true  → logo + vehicle/driver block + col headers (all pages)
    // showHeader=false → col headers only (NOT used for delivery pages anymore;
    //                    kept for TransporterSheet which has no header at all)
    //
    // Vehicle/driver block uses a nested table inside a colSpan="11" cell so
    // its column widths are fully independent from the 11-col delivery table.
    //
    // DOCUMENTO fix: CONDUCTOR label+value take cols 5-9 (5 cols, 42%),
    // leaving cols 10-12 for DOCUMENTO label+value (3 cols = 27%).
    // This gives the cedula field enough room without overflow.
    const PageHeader = ({ formData }) => (
        <>
            <tr>
                <td colSpan="11" style={{ padding: 0 }}>
                    {/* Logo + document code block */}
                    <table style={{ width:'100%', borderCollapse:'collapse', tableLayout:'fixed' }}>
                        <colgroup>
                            <col style={{width:'15%'}} />
                            <col style={{width:'35%'}} />
                            <col style={{width:'14%'}} />
                            <col style={{width:'36%'}} />
                        </colgroup>
                        <tbody>
                            <tr>
                                <td rowSpan="4" className="border border-black p-1 align-middle text-center">
                                    <img src={LOGO_URL} alt="Logo" className="max-h-14 mx-auto" />
                                </td>
                                <td rowSpan="4" className="border border-black p-1 align-middle text-center font-bold" style={{fontSize:'10px'}}>
                                    FORMATO CONTROL RUTA URBANA PDC
                                </td>
                                <td className="border border-black" style={hS}>Código</td>
                                <td className="border border-black" style={vS}>SL-FO-82</td>
                            </tr>
                            <tr>
                                <td className="border border-black" style={hS}>Dependencia</td>
                                <td className="border border-black" style={vS}>Servicios Logísticos</td>
                            </tr>
                            <tr>
                                <td className="border border-black" style={hS}>Versión</td>
                                <td className="border border-black" style={vS}>{FORMAT_VERSION}</td>
                            </tr>
                            <tr>
                                <td className="border border-black" style={hS}>Fecha</td>
                                <td className="border border-black" style={vS}>{FORMAT_DATE}</td>
                            </tr>
                        </tbody>
                    </table>

                    {/* Vehicle / driver block
                        12 cols: 6%+5%+7%+8% | 9%+8% | 6%+9% | 6%+9% | 9%+18% = 100%
                        RUTA row: CONDUCTOR takes col5+6 (label, 17%) + col7+8+9 (value, 24%)
                                  DOCUMENTO takes col10 (label, 6%) + col11+12 (value, 27%) */}
                    <table style={{ width:'100%', borderCollapse:'collapse', tableLayout:'fixed' }}>
                        <colgroup>
                            <col style={{width:'6%'}}  />
                            <col style={{width:'5%'}}  />
                            <col style={{width:'7%'}}  />
                            <col style={{width:'8%'}}  />
                            <col style={{width:'9%'}}  />
                            <col style={{width:'8%'}}  />
                            <col style={{width:'6%'}}  />
                            <col style={{width:'9%'}}  />
                            <col style={{width:'6%'}}  />
                            <col style={{width:'9%'}}  />
                            <col style={{width:'8%'}}  />
                            <col style={{width:'19%'}} />
                        </colgroup>
                        <tbody>
                            <tr>
                                <td className="border border-black" style={hS}>TURNO</td>
                                <td className="border border-black text-center" style={vS}>{formData.turno}</td>
                                <td className="border border-black" style={hS}>FECHA</td>
                                <td className="border border-black" style={vS}></td>
                                <td className="border border-black" style={hS}>TIPO DE<br/>VEHÍCULO</td>
                                <td className="border border-black text-center" style={vS}>{formData.vehiculo?.tipo || ''}</td>
                                <td className="border border-black" style={hS}>MARCA</td>
                                <td className="border border-black text-center" style={vS}>{formData.vehiculo?.marca || ''}</td>
                                <td className="border border-black" style={hS}>PLACA</td>
                                <td className="border border-black text-center" style={vS}>{formData.vehiculo?.placa || ''}</td>
                                <td className="border border-black" style={hS}>CAPACIDAD</td>
                                <td className="border border-black text-center" style={vS}>{formData.vehiculo?.capacidad || ''}</td>
                            </tr>
                            <tr>
                                <td className="border border-black" style={hS}>RUTA</td>
                                <td className="border border-black text-center" style={vS}>{formData.ruta}</td>
                                <td className="border border-black" style={hS}>HORA DE<br/>SALIDA</td>
                                <td className="border border-black" style={vS}></td>
                                {/* CONDUCTOR: label 2 cols, value 3 cols */}
                                <td className="border border-black" colSpan="2" style={hS}>NOMBRE DEL<br/>CONDUCTOR</td>
                                <td className="border border-black text-center" colSpan="3" style={{...vS, whiteSpace:'normal'}}>{formData.conductor?.nombres || ''}</td>
                                {/* DOCUMENTO: label 1 col, value 2 cols (19%) — wider than before */}
                                <td className="border border-black" style={hS}>DOCUMENTO</td>
                                <td className="border border-black text-center" colSpan="2" style={{...vS, whiteSpace:'normal', fontSize:'9px'}}>{formData.conductor?.cedula || ''}</td>
                            </tr>
                        </tbody>
                    </table>
                </td>
            </tr>

            {/* Delivery column headers */}
            <tr className="bg-gray-200 font-bold text-center">
                <td colSpan="11" className="border border-black" style={{padding:'4px', fontSize:'10px'}}>ENTREGA DE REPUESTOS</td>
            </tr>
            <tr className="bg-gray-100 font-bold text-center" style={{fontSize:'9px'}}>
                <td className="p-1 border border-black align-middle" colSpan="2" style={{width:'20%'}}>Nombre Destinatario</td>
                <td className="p-1 border border-black align-middle" colSpan="2" style={{width:'18%'}}>N° Entrega<br/>Traslado</td>
                <td className="p-1 border border-black align-middle" style={{width:'8%'}}>N°<br/>Piezas</td>
                <td className="p-1 border border-black align-middle" style={{width:'8%'}}>N°<br/>Precinto</td>
                <td className="p-1 border border-black align-middle" style={{width:'8%'}}>Canastilla<br/>N°</td>
                <td className="p-1 border border-black align-middle" colSpan="2" style={{width:'22%'}}>Observaciones (vidrios, piezas sueltas, puertas, costados, bumpers)</td>
                <td className="p-1 border border-black align-middle" colSpan="2" style={{width:'16%'}}>Recibido</td>
            </tr>
        </>
    );

    // ── DISPATCH PAGE ─────────────────────────────────────────────────────
    // showHeader=true on ALL delivery pages (including continuations).
    const DispatchPage = ({ rows, formData }) => {
        const ROW_H = `${ROW_HEIGHT_CM}cm`;

        const dataRow = (row) => {
            const count = row.selectedDeliveries.length;
            const deliveryText = Array.from({ length: Math.ceil(count / 2) })
                .map((_, i) => {
                    const a = row.selectedDeliveries[i * 2];
                    const b = row.selectedDeliveries[i * 2 + 1];
                    return b ? `${a} - ${b}` : a;
                }).join('\n');

            return (
                <tr key={row.customerCode} style={{ height: ROW_H }}>
                    <td className="p-1 border border-black align-top text-xs" colSpan="2">
                        {row.customerCode} - {row.customerName}
                    </td>
                    <td className="p-1 border border-black text-center align-top whitespace-pre-wrap font-mono"
                        colSpan="2" style={{ fontSize: DELIVERY_FONT }}>{deliveryText}</td>
                    <td className="p-1 border border-black"></td>
                    <td className="p-1 border border-black"></td>
                    <td className="p-1 border border-black"></td>
                    <td className="p-1 border border-black" colSpan="2"></td>
                    <td className="p-1 border border-black" colSpan="2"></td>
                </tr>
            );
        };

        return (
            <div className="dispatch-page bg-white p-4 shadow-lg mb-6 text-black">
                <table style={{ tableLayout:'fixed' }}>
                    <tbody>
                        <PageHeader formData={formData} />
                        {rows.map(dataRow)}
                        
                        <tr className="filler-row">
                            <td className="border-l border-b border-black" colSpan="2"></td>
                            <td className="border-b border-black" colSpan="2"></td>
                            <td className="border-b border-black"></td>
                            <td className="border-b border-black"></td>
                            <td className="border-b border-black"></td>
                            <td className="border-b border-black" colSpan="2"></td>
                            <td className="border-b border-r border-black" colSpan="2"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        );
    };

    // ── TRANSPORTER SHEET ─────────────────────────────────────────────────
    // Static page, rendered once after all delivery pages. No header.
    const TransporterSheet = () => (
        <div className="dispatch-page bg-white p-4 shadow-lg mb-6 text-black">
            <table className="text-xs" style={{ tableLayout:'fixed' }}>
                <tbody>
                    <tr className="bg-gray-200 font-bold text-center">
                        <td colSpan="13" className="p-2 border border-black">ENTREGA DE DOCUMENTOS</td>
                    </tr>
                    <tr className="bg-gray-100 font-bold text-center" style={{height:'36px'}}>
                        <td className="p-1 border border-black" colSpan="2">Centro destino</td>
                        <td className="p-1 border border-black">De</td>
                        <td className="p-1 border border-black" colSpan="4">Tipo de Documento</td>
                        <td className="p-1 border border-black" colSpan="3">Nombre quien recibe</td>
                        <td className="p-1 border border-black" colSpan="3">Firma de recibido</td>
                    </tr>
                    {Array.from({ length: 2 }).map((_, i) => (
                        <tr key={`doc-${i}`} style={{height:'24px'}}>
                            <td className="p-1 border border-black" colSpan="2"></td>
                            <td className="p-1 border border-black"></td>
                            <td className="p-1 border border-black" colSpan="4"></td>
                            <td className="p-1 border border-black" colSpan="3"></td>
                            <td className="p-1 border border-black" colSpan="3"></td>
                        </tr>
                    ))}

                    <tr className="bg-gray-200 font-bold text-center">
                        <td colSpan="13" className="p-2 border border-black">MERCANCIA DE TRASLADO</td>
                    </tr>
                    <tr className="bg-gray-100 font-bold text-center" style={{height:'36px'}}>
                        <td className="p-1 border border-black" colSpan="2">Centro destino</td>
                        <td className="p-1 border border-black">De</td>
                        <td className="p-1 border border-black" colSpan="4">Tipo de Documento</td>
                        <td className="p-1 border border-black" colSpan="3">Nombre quien recibe</td>
                        <td className="p-1 border border-black" colSpan="3">Firma de recibido</td>
                    </tr>
                    {Array.from({ length: 9 }).map((_, i) => (
                        <tr key={`cargo-${i}`} style={{height:'24px'}}>
                            <td className="p-1 border border-black" colSpan="2"></td>
                            <td className="p-1 border border-black"></td>
                            <td className="p-1 border border-black" colSpan="4"></td>
                            <td className="p-1 border border-black" colSpan="3"></td>
                            <td className="p-1 border border-black" colSpan="3"></td>
                        </tr>
                    ))}

                    <tr className="bg-gray-200 font-bold text-center">
                        <td colSpan="13" className="p-2 border border-black">INSPECCION CONDICIONES FISICAS INTERNAS FURGÓN DEL VEHICULO</td>
                    </tr>
                    <tr className="bg-gray-100 font-bold text-center">
                        <td className="p-1 border border-black" colSpan="7">ESTADO FURGON INTERNO</td>
                        <td className="p-1 border border-black" colSpan="2">CUMPLE</td>
                        <td className="p-1 border border-black" colSpan="2">NO CUMPLE</td>
                        <td className="p-1 border border-black" colSpan="2">OBSERVACIONES</td>
                    </tr>
                    {[
                        'El piso del furgón está en buen estado',
                        'Las paredes internas del furgón están en buen estado',
                        'Las paredes externas del furgón están en buen estado',
                        'Inexistencia de sustancias o elementos ilícitos en espacios vacíos',
                        'Puertas en buen estado y ajustadas',
                        'Evidencias fotográficas: Solo aplica cuando se evidencia una novedad',
                        'Orden y aseo dentro del furgón',
                    ].map((item, i) => (
                        <tr key={`insp-${i}`} style={{height:'24px'}}>
                            <td className="p-1 px-2 border border-black text-left" colSpan="7">{item}</td>
                            <td className="p-1 border border-black" colSpan="2"></td>
                            <td className="p-1 border border-black" colSpan="2"></td>
                            <td className="p-1 border border-black" colSpan="2"></td>

                    <tr className="bg-gray-200 font-bold text-center">
                        <td colSpan="13" className="p-2 border border-black">RESPONSABLES DE LA INSPECCIÓN</td>
                    </tr>
                    <tr style={{height:'24px'}}>
                        <td className="p-1 border-l border-r border-black font-bold text-center" colSpan="6">QUIEN ENTREGA:</td>
                        <td className="p-1 border-r border-black font-bold text-center" colSpan="7">QUIEN RECIBE:</td>
                    </tr>
                    {[['Nombre','Nombre'],['Cargo','Documento'],['Firma','Firma']].map(([l, r], i) => (
                        <tr key={l} style={{height:'28px'}}>
                            <td className={`p-1 border-l border-black font-bold ${i===2?'border-b':''}`}>{l}</td>
                            <td className={`p-1 border-r border-black ${i===2?'border-b':''}`} colSpan="5"></td>
                            <td className={`p-1 border-black font-bold ${i===2?'border-b':''}`}>{r}</td>
                            <td className={`p-1 border-r border-black ${i===2?'border-b':''}`} colSpan="6"></td>
                        </tr>
                    ))}
                    <tr>
                        <td className="p-1 border border-black" colSpan="13" style={{height:'48px'}}>
                            <span className="font-bold">Observaciones:</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    );

    // ── AUDIT PAGE 1 ──────────────────────────────────────────────────────
    const AuditPage1 = ({ rows }) => {
        const empty = Math.max(0, AUDIT_PER_PAGE - rows.length);
        const deliveryCell = (row) => Array.from({ length: Math.ceil(row.selectedDeliveries.length / 2) })
            .map((_, i) => {
                const a = row.selectedDeliveries[i*2], b = row.selectedDeliveries[i*2+1];
                return b ? `${a} - ${b}` : a;
            }).join('\n');

        return (
            <div className="dispatch-page bg-white p-4 shadow-lg mb-8 text-black">
                <table className="w-full border-collapse text-xs" style={{minWidth:'1000px'}}>
                    <tbody>
                        {/* Document code block */}
                        <tr>
                            <td rowSpan="4" colSpan="2" className="border border-black p-1 align-middle text-center">
                                <img src={LOGO_URL} alt="Logo" className="max-h-16 mx-auto" />
                            </td>
                            <td rowSpan="4" colSpan="5" className="border border-black p-1 align-middle text-center font-bold text-base">
                                FORMATO AUDITORIA INSPECCIÓN SALIDA DE REPUESTOS<br/>NACIONAL Y LOCAL
                            </td>
                            <td className="border border-black p-1 font-bold">Código</td>
                            <td className="border border-black p-1">SL-FO-81</td>
                        </tr>
                        <tr>
                            <td className="border border-black p-1 font-bold">Dependencia</td>
                            <td className="border border-black p-1">Servicios Logísticos</td>
                        </tr>
                        <tr>
                            <td className="border border-black p-1 font-bold">Versión</td>
                            <td className="border border-black p-1">{FORMAT_VERSION}</td>
                        </tr>
                        <tr>
                            <td className="border border-black p-1 font-bold">Fecha</td>
                            <td className="border border-black p-1">{FORMAT_DATE}</td>
                        </tr>

                        {/* Audit route/inspection sub-header */}
                        <tr>
                            <td colSpan="9" className="p-0">
                                <table className="w-full border-collapse text-xs">
                                    <tbody>
                                        <tr className="font-bold text-center bg-gray-100">
                                            <td className="p-1 border-t border-l border-b border-black" colSpan="2">RUTA</td>
                                            <td className="p-1 border-t border-b border-x border-black" colSpan="2">INICIO INSPECCIÓN</td>
                                            <td className="p-1 border-t border-b border-r border-black" colSpan="2">FIN INSPECCIÓN</td>
                                            <td className="p-1 border-t border-b border-r border-black" colSpan="2">LUGAR DE INSPECCIÓN</td>
                                            <td className="p-1 border-t border-b border-r border-black" colSpan="4">RESPONSABLE DE INSPECCIÓN</td>
                                        </tr>
                                        {[
                                            ['NACIONAL','','FECHA','','FECHA','','CENTRO','','NOMBRE','','NOMBRE',''],
                                            ['MANIFIESTO NO.','','HORA','','HORA','','NOMBRE','','CARGO','','CARGO',''],
                                            ['LOCAL','','TIPO DE VEHICULO','','MARCA','','MODELO','','PLACA DE VEHICULO','','CAPACIDAD',''],
                                        ].map((cols, ri) => (
                                            <tr key={ri}>
                                                {cols.map((c, ci) => (
                                                    <td key={ci}
                                                        className={`p-1 border-b border-r border-black ${ci===0?'border-l':''} ${c?'font-bold':''}`}
                                                        style={{width: ci%2===0 ? '12%' : '8%'}}>{c}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </td>
                        </tr>

                        <tr className="bg-gray-200 font-bold text-center">
                            <td colSpan="9" className="p-2 border border-black">INSPECCIÓN Y CONTROL DE SALIDA DE REPUESTOS</td>
                        </tr>
                        <tr className="bg-gray-100 font-bold text-center">
                            <td className="p-1 border border-black" style={{width:'12%'}}>Centro Destino</td>
                            <td className="p-1 border border-black" style={{width:'18%'}}>N° Entrega Traslado</td>
                            <td className="p-1 border border-black" style={{width:'7%'}}>N° Piezas</td>
                            <td className="p-1 border border-black" style={{width:'7%'}}>N° Precinto</td>
                            <td className="p-1 border border-black" colSpan="2" style={{width:'10%'}}>Delicado</td>
                            <td className="p-1 border border-black" style={{width:'30%'}}>Observaciones</td>
                            <td className="p-1 border border-black" colSpan="2" style={{width:'16%'}}>Firma recibido</td>

    // ── FILE UPLOAD ───────────────────────────────────────────────────────
    const FileUpload = ({ onFileUpload, error }) => {
        const [dragging, setDragging] = React.useState(false);
        const onDrag = React.useCallback((e) => {
            e.preventDefault(); e.stopPropagation();
            setDragging(e.type === 'dragenter' || e.type === 'dragover');
        }, []);
        const onDrop = React.useCallback((e) => {
            e.preventDefault(); e.stopPropagation();
            setDragging(false);
            if (e.dataTransfer.files?.[0]) onFileUpload(e.dataTransfer.files[0]);
        }, [onFileUpload]);

        return (
            <div className="text-center p-8">
                <div className="max-w-2xl mx-auto bg-[#2D5E98] rounded-lg shadow-xl p-10">
                    <h2 className="text-2xl font-semibold text-white mb-4">Cargar Archivo de Despachos</h2>
                    <p className="text-[#A3E5F5] mb-6">Seleccione o arrastre el archivo Excel (.xlsx, .xls) para comenzar.</p>
                    <div onDragEnter={onDrag} onDragOver={onDrag} onDragLeave={onDrag} onDrop={onDrop}
                        className={`relative border-2 border-dashed rounded-lg p-12 transition-colors ${dragging ? 'border-[#19BDE6] bg-[#19BDE6]/20' : 'border-[#858A8C] bg-[#152C47]'}`}>
                        <input type="file" id="fu" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                            accept=".xlsx,.xls" onChange={e => e.target.files?.[0] && onFileUpload(e.target.files[0])} />
                        <label htmlFor="fu" className="flex flex-col items-center space-y-4 cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12 text-[#858A8C]" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p className="text-lg text-white"><span className="font-semibold text-[#19BDE6]">Haga clic para cargar</span> o arrastre y suelte</p>
                            <p className="text-sm text-[#A3E5F5]">Soportado: XLSX, XLS</p>
                        </label>
                    </div>
                    {error && <p className="mt-4 text-[#A461AB] bg-[#A461AB]/20 p-3 rounded-md">{error}</p>}
                </div>
            </div>
        );
    };

    // ── FORM CONTROLS ─────────────────────────────────────────────────────
    const Sel = ({ label, value, onChange, loading, children }) => (
        <div>
            <label className="block text-sm font-medium text-[#A3E5F5] mb-1">{label}</label>
            <div className="relative">
                <select value={value} onChange={onChange}
                    className="appearance-none mt-1 block w-full pl-3 pr-10 py-2 text-sm bg-[#152C47] text-white focus:outline-none rounded-md">
                    {loading ? <option disabled>Cargando...</option> : children}
                </select>
                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                    <ChevronDown className="h-5 w-5 mt-1" />
                </div>
            </div>
        </div>
    );

    const FormControls = ({ formData, setFormData, drivers, vehicles, loading }) => (
        <div className="bg-[#2D5E98] p-6 rounded-lg shadow-md no-print">
            <h3 className="text-xl font-semibold mb-4 text-white">Datos Generales de la Planilla</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <Sel label="Conductor" loading={loading} value={formData.conductor?.cedula || ''}
                    onChange={e => setFormData(p => ({ ...p, conductor: drivers.find(d => String(d.cedula) === e.target.value) || null }))}>
                    <option value="" disabled>Seleccione un conductor</option>
                    {drivers.map(d => <option key={d.cedula} value={d.cedula}>{d.nombres}</option>)}
                </Sel>
                <Sel label="Vehículo (Placa)" loading={loading} value={formData.vehiculo?.placa || ''}
                    onChange={e => setFormData(p => ({ ...p, vehiculo: vehicles.find(v => String(v.placa) === e.target.value) || null }))}>
                    <option value="" disabled>Seleccione un vehículo</option>
                    {vehicles.map(v => <option key={v.placa} value={v.placa}>{v.placa} - {v.marca}</option>)}
                </Sel>
                <Sel label="Turno" value={formData.turno}
                    onChange={e => setFormData(p => ({ ...p, turno: e.target.value }))}>
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </Sel>
                <Sel label="Ruta" value={formData.ruta}
                    onChange={e => setFormData(p => ({ ...p, ruta: e.target.value }))}>
                    {['Centro','Sur','Norte'].map(r => <option key={r} value={r}>{r}</option>)}
                </Sel>
            </div>
        </div>
    );

    // ── CUSTOMER LIST ─────────────────────────────────────────────────────
    const CustomerItem = ({ customer, selected, onSelectionChange, onSelectAll, isHighlighted }) => {
        const [open, setOpen] = React.useState(false);
        const all  = customer.deliveries.length > 0 && customer.deliveries.every(d => selected.has(d.id));
        const some = customer.deliveries.some(d => selected.has(d.id));

        return (
            <div className={`rounded-lg border ${isHighlighted ? 'border-yellow-400 bg-yellow-400/10' : 'border-[#858A8C]/30 bg-[#152C47]/30'}`}>
                <div className="flex items-center justify-between p-3 cursor-pointer" onClick={() => setOpen(!open)}>
                    <label className="flex items-center space-x-3 cursor-pointer flex-1" onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={all}
                            ref={el => { if (el) el.indeterminate = some && !all; }}
                            onChange={e => onSelectAll(customer.customerCode, e.target.checked)}
                            className="h-4 w-4 rounded border-gray-400 bg-[#152C47] text-[#19BDE6] focus:ring-[#19BDE6]" />
                        <span className="font-semibold text-white">{customer.customerCode}</span>
                        <span className="text-[#A3E5F5] text-sm">{customer.customerName}</span>
                        <span className="text-xs text-[#858A8C]">({selected.size}/{customer.deliveries.length} seleccionadas)</span>
                    </label>
                    <ChevronDown className={`w-5 h-5 text-[#A3E5F5] transition-transform ${open ? 'rotate-180' : ''}`} />
                </div>
                {open && (
                    <div className="p-4 border-t border-[#858A8C]/30 bg-[#152C47]/50">
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                            {customer.deliveries.map(d => (
                                <label key={d.id} className="flex items-center space-x-2 cursor-pointer p-2 rounded-md hover:bg-[#A3E5F5]/10">
                                    <input type="checkbox" checked={selected.has(d.id)}
                                        onChange={e => onSelectionChange(customer.customerCode, d.id, e.target.checked)}
                                        className="h-4 w-4 rounded border-gray-400 bg-[#152C47] text-[#19BDE6] focus:ring-[#19BDE6]" />
                                    <span className="text-sm text-[#A3E5F5]">{d.id}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const CustomerList = ({ customers, selectedDeliveries, setSelectedDeliveries, highlightedCustomers }) => {
        const onChange = React.useCallback((cid, did, checked) => {
            setSelectedDeliveries(prev => {
                const m = new Map(prev), s = new Set(m.get(cid) || []);
                checked ? s.add(did) : s.delete(did);
                m.set(cid, s); return m;
            });
        }, [setSelectedDeliveries]);

        const onSelectAll = React.useCallback((cid, all) => {
            setSelectedDeliveries(prev => {
                const m = new Map(prev), c = customers.get(cid);
                if (!c) return prev;
                m.set(cid, all ? new Set(c.deliveries.map(d => d.id)) : new Set());
                return m;
            });
        }, [customers, setSelectedDeliveries]);

        // Select ALL deliveries across ALL customers
        const onSelectEverything = React.useCallback(() => {
            setSelectedDeliveries(() => {
                const m = new Map();
                customers.forEach((c, cid) => m.set(cid, new Set(c.deliveries.map(d => d.id))));
                return m;
            });
        }, [customers, setSelectedDeliveries]);

        const allSelected = React.useMemo(() => {
            if (!customers.size) return false;
            return Array.from(customers.values()).every(c => {
                const s = selectedDeliveries.get(c.customerCode);
                return s && c.deliveries.every(d => s.has(d.id));
            });
        }, [customers, selectedDeliveries]);

        return (
            <div className="bg-[#2D5E98] p-6 rounded-lg shadow-md no-print">
                <div className="flex justify-between items-center mb-4">
                    <h3 className="text-xl font-semibold text-white">Selección de Entregas por Cliente</h3>
                    {customers.size > 0 && (
                        <button onClick={onSelectEverything} disabled={allSelected}
                            className="px-4 py-2 text-sm font-bold rounded-md text-[#152C47] bg-[#19BDE6] hover:bg-[#14a8cf] disabled:bg-[#858A8C] disabled:text-white/70 disabled:cursor-not-allowed">
                            Seleccionar Todo
                        </button>
                    )}
                </div>
                {customers.size > 0 ? (
                    <div className="space-y-4">
                        {Array.from(customers.values()).map(c => (
                            <CustomerItem key={c.customerCode} customer={c}
                                selected={selectedDeliveries.get(c.customerCode) || new Set()}
                                onSelectionChange={onChange} onSelectAll={onSelectAll}
                                isHighlighted={highlightedCustomers.has(c.customerCode)} />
                        ))}
                    </div>
                ) : (
                    <div className="text-center py-10 px-6 bg-[#152C47]/50 rounded-lg">
                        <p className="text-sm font-medium text-white">No hay entregas pendientes</p>
                        <p className="mt-1 text-sm text-[#A3E5F5]">Todas las entregas del archivo han sido despachadas.</p>
                    </div>
                )}
            </div>
        );
    };

    // ── DISPATCH PREVIEW ──────────────────────────────────────────────────
    const DispatchPreview = ({ customers, selectedDeliveries, formData, onBack, onFinalize, generateAuditSheet }) => {
        const deliveryRows = React.useMemo(() => {
            const rows = [];
            selectedDeliveries.forEach((ids, code) => {
                if (ids.size > 0) {
                    const c = customers.get(code);
                    if (c) rows.push({ ...c, selectedDeliveries: Array.from(ids).sort((a, b) => String(a).localeCompare(String(b))) });
                }
            });
            return rows;
        }, [customers, selectedDeliveries]);

        const pages = React.useMemo(() => paginateRows(deliveryRows), [deliveryRows]);

        const auditPages = React.useMemo(() => {
            if (!generateAuditSheet) return [];
            const n = Math.ceil(deliveryRows.length / AUDIT_PER_PAGE);
            return Array.from({ length: Math.max(n, 1) }, (_, i) =>
                deliveryRows.slice(i * AUDIT_PER_PAGE, (i + 1) * AUDIT_PER_PAGE)
            );
        }, [deliveryRows, generateAuditSheet]);

        const handlePrint = () => {
            const h = () => { onFinalize(); window.removeEventListener('afterprint', h); };
            window.addEventListener('afterprint', h);
            window.print();
        };

        return (
            <div className="bg-[#2D5E98] p-6 rounded-lg shadow-2xl dispatch-preview-container">
                <div className="flex justify-between items-center mb-6 no-print">
                    <h2 className="text-2xl font-bold text-white">Vista Previa de la Planilla</h2>
                    <div className="flex items-center space-x-4">
                        <button onClick={handlePrint}
                            className="px-4 py-2 text-sm font-bold text-[#152C47] bg-[#BACF00] rounded-md hover:bg-[#a7b900]">
                            Imprimir
                        </button>
                        <button onClick={onBack}
                            className="px-4 py-2 text-sm font-medium text-white bg-[#858A8C] rounded-md hover:bg-[#6c7072]">
                            Volver a Editar
                        </button>
                    </div>
                </div>

                {/* All delivery pages include the full header (showHeader always true) */}
                {pages.map((pageRows, i) => (
                    <DispatchPage key={`p-${i}`} rows={pageRows} formData={formData} />
                ))}

                {/* Transporter sheet: once, after all delivery pages, no header */}
                <TransporterSheet />

                {/* Audit pages (optional) */}
                {generateAuditSheet && (
                    <>
                        {auditPages.map((pageRows, i) => <AuditPage1 key={`a1-${i}`} rows={pageRows} />)}
                        <AuditPage2 />
                    </>
                )}
            </div>
        );
    };

    // ── APP ───────────────────────────────────────────────────────────────
    const App = () => {
        const { useState, useCallback, useMemo, useEffect } = React;
        const INIT = { turno:'AM', ruta:'Centro', conductor:null, vehiculo:null };

        const [masterList,       setMasterList]       = useState(null);
        const [customers,        setCustomers]        = useState(null);
        const [selected,         setSelected]         = useState(new Map());
        const [highlighted,      setHighlighted]      = useState(new Set());
        const [auditSheet,       setAuditSheet]       = useState(false);
        const [drivers,          setDrivers]          = useState([]);
        const [vehicles,         setVehicles]         = useState([]);
        const [loadingDB,        setLoadingDB]        = useState(true);
        const [view,             setView]             = useState('upload');
        const [error,            setError]            = useState(null);
        const [fileName,         setFileName]         = useState('');
        const [formData,         setFormData]         = useState(INIT);

        useEffect(() => {
            (async () => {
                try {
                    const [{ data: dr }, { data: vh }] = await Promise.all([
                        supabaseClient.from('conductores').select('*'),
                        supabaseClient.from('vehiculos').select('*'),
                    ]);
                    setDrivers((dr||[]).sort((a,b) => a.nombres.localeCompare(b.nombres)));
                    setVehicles((vh||[]).sort((a,b) => a.placa.localeCompare(b.placa)));
                } catch(e) {
                    setError(`Error al conectar con la base de datos: ${e.message}`);
                } finally {
                    setLoadingDB(false);
                }
            })();
        }, []);

        const processFile = useCallback((file) => {
            setFileName(file.name); setError(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb   = XLSX.read(e.target?.result, { type:'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    if (!data.length) throw new Error('El archivo Excel está vacío.');

                    const find = (row, t) => {
                        const tl = t.toLowerCase().trim().replace(/\s+/g,' ');
                        return Object.keys(row).find(k => k.toLowerCase().trim().replace(/\s+/g,' ') === tl) || null;
                    };
                    const r0 = data[0];
                    const dH = find(r0,'Entrega');
                    const cH = find(r0,'Destinatario mcía.');
                    const nH = find(r0,'Nombre destinatario de mercancías');
                    if (!dH||!cH||!nH) {
                        const miss = [!dH&&"'Entrega'",!cH&&"'Destinatario mcía.'",!nH&&"'Nombre destinatario de mercancías'"].filter(Boolean).join(', ');
                        throw new Error(`Columnas no encontradas: ${miss}`);
                    }

                    const map = new Map();
                    data.forEach(row => {
                        const code = String(row[cH]), name = row[nH], id = row[dH];
                        if (!code||!name||id===undefined||code.toLowerCase()==='undefined') return;
                        if (!map.has(code)) map.set(code, { customerCode:code, customerName:name, deliveries:[] });
                        const c = map.get(code);
                        if (!c.deliveries.find(d => d.id===id)) c.deliveries.push({ id });
                    });
                    map.forEach(c => c.deliveries.sort((a,b) => String(a.id).localeCompare(String(b.id))));
                    if (!map.size) throw new Error('No se pudo agrupar ningún cliente.');

                    setMasterList(map); setCustomers(map);
                    setSelected(new Map()); setView('dashboard');
                } catch(err) {
                    setError(err.message||'Error al procesar el archivo.');
                    setView('upload');
                }
            };
            reader.onerror = () => { setError('No se pudo leer el archivo.'); setView('upload'); };
            reader.readAsBinaryString(file);
        }, []);

        const handleReset = () => {
            setMasterList(null); setCustomers(null);
            setSelected(new Map()); setFormData(INIT);
            setFileName(''); setError(null); setAuditSheet(false);
            setView('upload');
        };

        const handleBackToEdit = () => {
            const partial = new Set();
            customers?.forEach(c => {
                const s = selected.get(c.customerCode);
                if (s?.size>0 && s.size<c.deliveries.length) partial.add(c.customerCode);
            });
            setHighlighted(partial); setView('dashboard');
        };

        const handleFinalize = () => {
            const updated = new Map(JSON.parse(JSON.stringify(Array.from(customers))));
            selected.forEach((ids, code) => {
                if (updated.has(code) && ids.size>0) {
                    const c = updated.get(code);
                    c.deliveries = c.deliveries.filter(d => !ids.has(d.id));
                    c.deliveries.length===0 ? updated.delete(code) : updated.set(code,c);
                }
            });
            setCustomers(updated); setMasterList(updated);
            setSelected(new Map()); setView('dashboard');
        };

        const isReady = useMemo(() =>
            Array.from(selected.values()).some(s => s.size>0) && formData.conductor && formData.vehiculo,
            [selected, formData]
        );

        return (
            <div className="min-h-screen bg-[#152C47] text-white">
                <header className="bg-black/20 shadow-lg no-print">
                    <div className="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-white flex items-center">
                            <img src={LOGO_URL} alt="Logo" className="h-16 w-auto mr-4" />
                            Generador de Planillas de Despacho
                        </h1>
                        {view !== 'upload' && (
                            <button onClick={handleReset}
                                className="px-4 py-2 text-sm font-medium text-white bg-[#A461AB] rounded-md hover:bg-[#8e5292]">
                                Empezar de Nuevo
                            </button>
                        )}
                    </div>
                </header>

                <main className="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
                    {view === 'upload' && <FileUpload onFileUpload={processFile} error={error} />}

                    {view === 'dashboard' && customers && (
                        <div className="space-y-8">
                            <div className="bg-[#2D5E98] p-6 rounded-lg shadow-md no-print">
                                <h2 className="text-xl font-semibold mb-2 text-white">
                                    Archivo: <span className="text-[#A3E5F5] font-medium">{fileName}</span>
                                </h2>
                                <p className="text-[#A3E5F5]">
                                    {customers.size > 0 ? 'Configure los detalles y seleccione las entregas.' : 'Todas las entregas han sido procesadas.'}
                                </p>
                            </div>
                            <FormControls formData={formData} setFormData={setFormData}
                                drivers={drivers} vehicles={vehicles} loading={loadingDB} />
                            <CustomerList customers={customers} selectedDeliveries={selected}
                                setSelectedDeliveries={setSelected} highlightedCustomers={highlighted} />
                            <div className="flex justify-end items-center mt-8 no-print">
                                <label className="flex items-center space-x-3 mr-6 cursor-pointer">
                                    <input type="checkbox" checked={auditSheet}
                                        onChange={e => setAuditSheet(e.target.checked)}
                                        className="h-5 w-5 rounded border-gray-400 bg-[#152C47] text-[#BACF00] focus:ring-[#BACF00]" />
                                    <span className="font-medium text-white select-none">Generar Planilla de Auditoría</span>
                                </label>
                                <button onClick={() => { setHighlighted(new Set()); setView('preview'); }}
                                    disabled={!isReady}
                                    className="px-6 py-3 text-base font-bold rounded-md text-[#152C47] bg-[#BACF00] hover:bg-[#a7b900] disabled:bg-[#858A8C] disabled:text-white/70 disabled:cursor-not-allowed">
                                    Generar Planilla
                                </button>
                            </div>
                            {!isReady && customers.size > 0 && (
                                <p className="text-right text-sm text-yellow-900 bg-[#F1E519]/80 p-3 rounded-md mt-2 no-print font-semibold">
                                    Complete conductor, vehículo y seleccione al menos una entrega para continuar.
                                </p>
                            )}
                        </div>
                    )}

                    {view === 'preview' && masterList && (
                        <DispatchPreview
                            customers={masterList} selectedDeliveries={selected}
                            formData={formData} onBack={handleBackToEdit}
                            onFinalize={handleFinalize} generateAuditSheet={auditSheet}
                        />
                    )}
                </main>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
