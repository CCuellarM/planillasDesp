<!DOCTYPE html>

<head>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ── SCREEN: each dispatch-page looks like an A4 sheet ── */
        .dispatch-page {
            width: 210mm;
            min-height: 297mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* The main table stretches to fill all available vertical space */
        .dispatch-page > table {
            flex: 1;
            width: 100%;
            border-collapse: collapse;
        }
        /* The filler <tr> (last row) absorbs leftover space */
        .filler-row {
            height: 100%;
        }

        /* ── PRINT ── */
        @media print {
            @page { size: A4; margin: 6mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            main, .dispatch-preview-container {
                margin: 0 !important; padding: 0 !important;
                box-shadow: none !important; border: none !important;
            }
            .dispatch-page {
                page-break-after: always;
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 6mm !important;
                /* On print, height is exactly one A4 page */
                height: 297mm;
            }
            .dispatch-page:last-of-type { page-break-after: avoid; }
            table { width: 100% !important; }
        }
    </style>
</head>
<body class="bg-[#152C47]">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { createClient } = supabase;
        const supabaseUrl = 'https://uemerxsdwrygafqmwvdz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlbWVyeHNkd3J5Z2FmcW13dmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEyNDY2MjgsImV4cCI6MjA3NjgyMjYyOH0.F35Dj1qUxPDQlSdz82KAeH6wGIz_uDYCZpoeJs0LC-c';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const LOGO_URL = 'https://uemerxsdwrygafqmwvdz.supabase.co/storage/v1/object/sign/imagenes/logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9jNzVkZWIxYi00MWYyLTRjN2QtYWQ2Ni0wN2YyNDU1YzNlYTUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJpbWFnZW5lcy9sb2dvLnBuZyIsImlhdCI6MTc2MTc0NzQ4MiwiZXhwIjoxNzkzMjgzNDgyfQ.ZbKEeYvifiVXIDWlXRek6MZnJY2QS-P3ILYz2MVuCTc';
        const AUDIT_DELIVERIES_PER_PAGE = 13;

        // ─────────────────────────────────────────────────────────────────
        //  PAGINATION LOGIC
        //  Each data row has a "weight" = number of text lines it will render.
        //  We accumulate weight until we exceed the page budget, then cut.
        //
        //  Budget calibration:
        //    A4 at 96 dpi = ~1123 px tall.
        //    Fixed overhead per page (logo header + vehicle row + col headers): ~195 px.
        //    Available for data rows: ~928 px.
        //    One base text line ≈ 20 px. Min row = 2 lines (40 px) + 16 px padding = 56 px.
        //    Conservative budget to ensure no overflow on print: 860 px.
        //
        //  If a SINGLE row exceeds the budget (many deliveries), it gets its own page.
        // ─────────────────────────────────────────────────────────────────
        const PAGE_BUDGET_PX = 860;
        const LINE_HEIGHT_PX  = 20;   // height of one delivery text line
        const ROW_PADDING_PX  = 18;   // top+bottom cell padding per row
        const MIN_ROW_PX      = 56;   // minimum row height (1-2 deliveries)

        function estimateRowHeight(deliveryCount) {
            const lines = Math.max(1, Math.ceil(deliveryCount / 2));
            return Math.max(MIN_ROW_PX, lines * LINE_HEIGHT_PX + ROW_PADDING_PX);
        }

        function paginateRows(deliveryRows) {
            const pages = [];
            let currentPage = [];
            let usedPx = 0;

            for (const row of deliveryRows) {
                const h = estimateRowHeight(row.selectedDeliveries.length);
                // If adding this row overflows and the page already has rows, flush
                if (usedPx + h > PAGE_BUDGET_PX && currentPage.length > 0) {
                    pages.push(currentPage);
                    currentPage = [];
                    usedPx = 0;
                }
                currentPage.push({ ...row, _rowPx: h });
                usedPx += h;
            }
            if (currentPage.length > 0) pages.push(currentPage);
            return pages;
        }

        // ─────────────────────────────────────────────────────────────────
        //  ICONS
        // ─────────────────────────────────────────────────────────────────
        const ChevronDownIcon = (props) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" {...props}>

        // ─────────────────────────────────────────────────────────────────

                                    </tr>

                                    <col style={{width:'6%'}} />   {/* TURNO lbl */}

                                    <col style={{width:'8%'}} />   {/* val */}
                                    <col style={{width:'8%'}} />   {/* TIPO lbl */}
                                    <col style={{width:'8%'}} />   {/* val */}
                                    <col style={{width:'6%'}} />   {/* MARCA lbl */}
                                    <col style={{width:'9%'}} />   {/* val */}
                                    <col style={{width:'6%'}} />   {/* PLACA lbl */}
                                    <col style={{width:'9%'}} />   {/* val */}
                                    <col style={{width:'8%'}} />   {/* CAPACIDAD lbl */}
                                    <col style={{width:'11%'}} />  {/* val */}
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <td className="border border-black" style={hStyle}>TURNO</td>
                                        <td className="border border-black text-center" style={vStyle}>{formData.turno}</td>
                                        <td className="border border-black" style={hStyle}>FECHA</td>
                                        <td className="border border-black" style={vStyle}></td>
                                        <td className="border border-black" style={hStyle}>TIPO DE<br/>VEHÍCULO</td>
                                        <td className="border border-black text-center" style={vStyle}>{formData.vehiculo?.tipo || ''}</td>
                                        <td className="border border-black" style={hStyle}>MARCA</td>
                                        <td className="border border-black text-center" style={vStyle}>{formData.vehiculo?.marca || ''}</td>
                                        <td className="border border-black" style={hStyle}>PLACA</td>
                                        <td className="border border-black text-center" style={vStyle}>{formData.vehiculo?.placa || ''}</td>
                                        <td className="border border-black" style={hStyle}>CAPACIDAD</td>
                                        <td className="border border-black text-center" style={vStyle}>{formData.vehiculo?.capacidad || ''}</td>
                                    </tr>
                                    <tr>
                                        <td className="border border-black" style={hStyle}>RUTA</td>

                                        {/* CONDUCTOR: label narrow, value wide */}
                                        <td className="border border-black" colSpan="2" style={hStyle}>NOMBRE DEL CONDUCTOR</td>

                                    </tr>
                                </tbody>
                            </table>

                    </tr>

                {/* Column headers of the delivery table — always shown */}

        // ─────────────────────────────────────────────────────────────────
        //  DISPATCH PAGE

        const DispatchPage = ({ rows, formData, showHeader }) => {
            const dataRow = (row) => {
                const count = row.selectedDeliveries.length;
                const fontSize = count <= 4 ? '11px' : count <= 8 ? '9px' : count <= 12 ? '7.5px' : '6px';
                const deliveryText = Array.from({ length: Math.ceil(count / 2) })
                    .map((_, i) => {
                        const a = row.selectedDeliveries[i * 2];
                        const b = row.selectedDeliveries[i * 2 + 1];
                        return b ? `${a} - ${b}` : a;
                    })
                    .join('\n');

                // 1-2 deliveries → fixed height so the auxiliar has room for observations.
                // 3+ deliveries → height is driven by content (browser decides).
                const rowStyle = count <= 2 ? { height: '64px' } : {};

                return (
                    <tr key={row.customerCode} style={rowStyle}>
                        <td className="p-1 border border-black text-center align-top text-xs">{row.customerCode}</td>

                        {/* MERCANCIA DE TRASLADO */}

                        <tr className="bg-gray-100 font-bold text-center" style={{height:'36px'}}>

        // ─────────────────────────────────────────────────────────────────

        // ─────────────────────────────────────────────────────────────────
        const AuditPage1 = ({ rows }) => {
            const numEmptyRows = Math.max(0, AUDIT_DELIVERIES_PER_PAGE - rows.length);
            return (
            <div className="dispatch-page bg-white p-4 shadow-lg mb-8 text-black">
                <table className="w-full border-collapse border-black text-xs" style={{minWidth:'1000px'}}>

            }, []);
            const handleDrop = React.useCallback((e) => {
                e.preventDefault(); e.stopPropagation();

            return (

                    <div className="max-w-2xl mx-auto bg-[#2D5E98] rounded-lg shadow-xl p-10">

        const CustomerList = ({ customers, selectedDeliveries, setSelectedDeliveries, highlightedCustomers }) => {
            const handleSelectionChange = React.useCallback((customerId, deliveryId, isSelected) => {
                setSelectedDeliveries(prev => {
                    const newMap = new Map(prev);
                    const set = new Set(newMap.get(customerId) || []);
                    isSelected ? set.add(deliveryId) : set.delete(deliveryId);
                    newMap.set(customerId, set);
                    return newMap;
                });
            }, [setSelectedDeliveries]);

            const handleSelectAll = React.useCallback((customerId, shouldSelectAll) => {
                setSelectedDeliveries(prev => {
                    const newMap = new Map(prev);
                    const customer = customers.get(customerId);
                    if (!customer) return prev;
                    newMap.set(customerId, shouldSelectAll ? new Set(customer.deliveries.map(d => d.id)) : new Set());
                    return newMap;

            return (
                <div className="bg-[#2D5E98] p-6 rounded-lg shadow-md no-print">
                    <h3 className="text-xl font-semibold mb-4 text-white">Selección de Entregas por Cliente</h3>
                    {customers.size > 0 ? (
                        <div className="space-y-4">
                            {Array.from(customers.values()).map(customer => (
                                <CustomerItem key={customer.customerCode} customer={customer}
                                    selected={selectedDeliveries.get(customer.customerCode) || new Set()}
                                    onSelectionChange={handleSelectionChange} onSelectAll={handleSelectAll}
                                    isHighlighted={highlightedCustomers.has(customer.customerCode)} />
                            ))}
                        </div>
                    ) : (
                        <div className="text-center py-10 px-6 bg-[#152C47]/50 rounded-lg">
                            <h3 className="mt-2 text-sm font-medium text-white">No hay entregas pendientes</h3>
                            <p className="mt-1 text-sm text-[#A3E5F5]">¡Buen trabajo! Todas las entregas del archivo han sido despachadas.</p>
                        </div>
                    )}
                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────────
        //  DISPATCH PREVIEW  — orchestrates pages + transporter sheets
        // ─────────────────────────────────────────────────────────────────
        const DispatchPreview = ({ customers, selectedDeliveries, formData, onBack, onFinalize, generateAuditSheet }) => {
            const deliveryRows = React.useMemo(() => {
                const rows = [];
                selectedDeliveries.forEach((deliveryIds, customerCode) => {
                    if (deliveryIds.size > 0) {
                        const customerData = customers.get(customerCode);
                        if (customerData) {
                            rows.push({
                                ...customerData,
                                selectedDeliveries: Array.from(deliveryIds).sort((a, b) => String(a).localeCompare(String(b))),
                            });
                        }
                    }
                });
                return rows;
            }, [customers, selectedDeliveries]);

            // Dynamic pagination — no fixed row limit
            const pages = React.useMemo(() => paginateRows(deliveryRows), [deliveryRows]);

            // Audit pagination — keeps fixed 13 for audit sheet
            const auditPages = React.useMemo(() => {
                if (!generateAuditSheet) return [];
                const n = Math.ceil(deliveryRows.length / AUDIT_DELIVERIES_PER_PAGE);
                return Array.from({ length: Math.max(n, 1) }, (_, i) =>
                    deliveryRows.slice(i * AUDIT_DELIVERIES_PER_PAGE, (i + 1) * AUDIT_DELIVERIES_PER_PAGE)
                );
            }, [deliveryRows, generateAuditSheet]);

            const handlePrintAndFinalize = () => {
                const afterPrintHandler = () => {
                    onFinalize();
                    window.removeEventListener('afterprint', afterPrintHandler);
                };
                window.addEventListener('afterprint', afterPrintHandler);
                window.print();
            };

            return (
                <div className="bg-[#2D5E98] p-6 rounded-lg shadow-2xl dispatch-preview-container">
                    <div className="flex justify-between items-center mb-6 no-print">
                        <h2 className="text-2xl font-bold text-white">Vista Previa de la Planilla</h2>
                        <div className="flex items-center space-x-4">
                            <button onClick={handlePrintAndFinalize}
                                className="px-4 py-2 text-sm font-bold text-[#152C47] bg-[#BACF00] rounded-md hover:bg-[#a7b900]">
                                Imprimir
                            </button>
                            <button onClick={onBack}
                                className="px-4 py-2 text-sm font-medium text-white bg-[#858A8C] rounded-md hover:bg-[#6c7072]">
                                Volver a Editar
                            </button>
                        </div>
                    </div>

                    {/*
                        Delivery pages:
                        - Page 0: showHeader=true (logo + vehicle/driver block)
                        - Page 1+: showHeader=false (only column headers, no repeated logo)
                        TransporterSheet: rendered ONCE after all delivery pages.
                    */}
                    {pages.map((pageRows, index) => (
                        <DispatchPage key={`page-${index}`} rows={pageRows} formData={formData} showHeader={index === 0} />
                    ))}
                    <TransporterSheet />

                    {/* AUDIT PAGES */}
                    {generateAuditSheet && (
                        <div className="print-new-page">
                            {auditPages.map((pageRows, index) => (
                                <AuditPage1 key={`audit-p1-${index}`} rows={pageRows} />
                            ))}
                            <AuditPage2 />
                        </div>
                    )}
                </div>
            );
        };

        // ─────────────────────────────────────────────────────────────────
        //  MAIN APP
        // ─────────────────────────────────────────────────────────────────
        const App = () => {
            const { useState, useCallback, useMemo, useEffect } = React;
            const [masterCustomerList, setMasterCustomerList] = useState(null);
            const [groupedCustomers, setGroupedCustomers] = useState(null);
            const [selectedDeliveries, setSelectedDeliveries] = useState(new Map());
            const [highlightedCustomers, setHighlightedCustomers] = useState(new Set());
            const [generateAuditSheet, setGenerateAuditSheet] = useState(false);
            const [drivers, setDrivers] = useState([]);
            const [vehicles, setVehicles] = useState([]);
            const [loadingInitialData, setLoadingInitialData] = useState(true);
            const [view, setView] = useState('upload');
            const [error, setError] = useState(null);
            const [fileName, setFileName] = useState('');

            const initialFormData = { turno: 'AM', ruta: 'Centro', conductor: null, vehiculo: null };
            const [formData, setFormData] = useState(initialFormData);

            useEffect(() => {
                const fetchInitialData = async () => {
                    setLoadingInitialData(true);
                    try {
                        const { data: driversData, error: driversError } = await supabaseClient.from('conductores').select('*');
                        if (driversError) throw driversError;
                        setDrivers((driversData || []).sort((a, b) => a.nombres.localeCompare(b.nombres)));

                        const { data: vehiclesData, error: vehiclesError } = await supabaseClient.from('vehiculos').select('*');
                        if (vehiclesError) throw vehiclesError;
                        setVehicles((vehiclesData || []).sort((a, b) => a.placa.localeCompare(b.placa)));
                    } catch (err) {
                        setError(`Error al conectar con la base de datos: ${err.message}`);
                    } finally {
                        setLoadingInitialData(false);
                    }
                };
                fetchInitialData();
            }, []);

            const processFile = useCallback((file) => {
                setFileName(file.name);
                setError(null);
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const workbook = XLSX.read(e.target?.result, { type: 'binary' });
                        const rawJsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                        const findHeader = (row, target) => {
                            const t = target.toLowerCase().trim().replace(/\s+/g, ' ');
                            return Object.keys(row).find(k => k.toLowerCase().trim().replace(/\s+/g, ' ') === t) || null;
                        };

                        if (rawJsonData.length === 0) throw new Error("El archivo Excel está vacío.");
                        const firstRow = rawJsonData[0];
                        const deliveryH = findHeader(firstRow, 'Entrega');
                        const codeH = findHeader(firstRow, 'Destinatario mcía.');
                        const nameH = findHeader(firstRow, 'Nombre destinatario de mercancías');

                        if (!deliveryH || !codeH || !nameH) {
                            const missing = [!deliveryH && "'Entrega'", !codeH && "'Destinatario mcía.'", !nameH && "'Nombre destinatario de mercancías'"].filter(Boolean).join(', ');
                            throw new Error(`No se encontraron las columnas requeridas: ${missing}.`);
                        }

                        const customers = new Map();
                        rawJsonData.forEach(row => {
                            const code = String(row[codeH]);
                            const name = row[nameH];
                            const id = row[deliveryH];
                            if (!code || !name || id === undefined || code.toLowerCase() === 'undefined') return;
                            if (!customers.has(code)) customers.set(code, { customerCode: code, customerName: name, deliveries: [] });
                            const c = customers.get(code);
                            if (!c.deliveries.find(d => d.id === id)) c.deliveries.push({ id });
                        });
                        customers.forEach(c => c.deliveries.sort((a, b) => String(a.id).localeCompare(String(b.id))));

                        if (customers.size === 0) throw new Error("No se pudo agrupar ningún cliente.");
                        setMasterCustomerList(customers);
                        setGroupedCustomers(customers);
                        setSelectedDeliveries(new Map());
                        setView('dashboard');
                    } catch (err) {
                        setError(err.message || "Error al procesar el archivo.");
                        setView('upload');
                    }
                };
                reader.onerror = () => { setError("No se pudo leer el archivo."); setView('upload'); };
                reader.readAsBinaryString(file);
            }, []);

            const handleReset = () => {
                setMasterCustomerList(null); setGroupedCustomers(null);
                setSelectedDeliveries(new Map()); setFormData(initialFormData);
                setFileName(''); setError(null); setGenerateAuditSheet(false);
                setView('upload');
            };

            const handleBackToEdit = () => {
                const partial = new Set();
                groupedCustomers?.forEach(c => {
                    const sel = selectedDeliveries.get(c.customerCode);
                    if (sel?.size > 0 && sel.size < c.deliveries.length) partial.add(c.customerCode);
                });
                setHighlightedCustomers(partial);
                setView('dashboard');
            };

            const handleFinalizeAndReset = () => {
                const updated = new Map(JSON.parse(JSON.stringify(Array.from(groupedCustomers))));
                selectedDeliveries.forEach((ids, code) => {
                    if (updated.has(code) && ids.size > 0) {
                        const c = updated.get(code);
                        c.deliveries = c.deliveries.filter(d => !ids.has(d.id));
                        c.deliveries.length === 0 ? updated.delete(code) : updated.set(code, c);
                    }
                });
                setGroupedCustomers(updated);
                setMasterCustomerList(updated);
                setSelectedDeliveries(new Map());
                setView('dashboard');
            };

            const isPreviewReady = useMemo(() =>
                Array.from(selectedDeliveries.values()).some(s => s.size > 0) && formData.conductor && formData.vehiculo,
                [selectedDeliveries, formData]
            );

            return (
                <div className="min-h-screen bg-[#152C47] text-white">
                    <header className="bg-black/20 shadow-lg no-print">
                        <div className="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-white flex items-center">
                                <img src={LOGO_URL} alt="Logo" className="h-16 w-auto mr-4" />
                                Generador de Planillas de Despacho
                            </h1>
                            {view !== 'upload' && (
                                <button onClick={handleReset}
                                    className="px-4 py-2 text-sm font-medium text-white bg-[#A461AB] border border-transparent rounded-md shadow-sm hover:bg-[#8e5292]">
                                    Empezar de Nuevo
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
                        {view === 'upload' && <FileUpload onFileUpload={processFile} error={error} />}

                        {view === 'dashboard' && groupedCustomers && (
                            <div className="space-y-8">
                                <div className="bg-[#2D5E98] p-6 rounded-lg shadow-md no-print">
                                    <h2 className="text-xl font-semibold mb-2 text-white">
                                        Archivo Cargado: <span className="text-[#A3E5F5] font-medium">{fileName}</span>
                                    </h2>
                                    <p className="text-[#A3E5F5]">
                                        {groupedCustomers.size > 0
                                            ? "Configure los detalles y seleccione las entregas a incluir."
                                            : "Todas las entregas de este archivo ya han sido procesadas."}
                                    </p>
                                </div>
                                <FormControls formData={formData} setFormData={setFormData} drivers={drivers} vehicles={vehicles} loading={loadingInitialData} />
                                <CustomerList customers={groupedCustomers} selectedDeliveries={selectedDeliveries}
                                    setSelectedDeliveries={setSelectedDeliveries} highlightedCustomers={highlightedCustomers} />
                                <div className="flex justify-end items-center mt-8 no-print">
                                    <label className="flex items-center space-x-3 mr-6 cursor-pointer">
                                        <input type="checkbox" checked={generateAuditSheet}
                                            onChange={e => setGenerateAuditSheet(e.target.checked)}
                                            className="h-5 w-5 rounded border-gray-400 bg-[#152C47] text-[#BACF00] focus:ring-[#BACF00]" />
                                        <span className="font-medium text-white select-none">Generar Planilla de Auditoría</span>
                                    </label>
                                    <button onClick={() => { setHighlightedCustomers(new Set()); setView('preview'); }}
                                        disabled={!isPreviewReady}
                                        className="inline-flex items-center px-6 py-3 border border-transparent text-base font-bold rounded-md shadow-sm text-[#152C47] bg-[#BACF00] hover:bg-[#a7b900] disabled:bg-[#858A8C] disabled:text-white/70 disabled:cursor-not-allowed">
                                        Generar Planilla
                                    </button>
                                </div>
                                {!isPreviewReady && groupedCustomers.size > 0 && (
                                    <div className="text-right text-sm text-yellow-900 bg-[#F1E519]/80 p-3 rounded-md mt-2 no-print font-semibold">
                                        Por favor, complete todos los campos (Conductor, Vehículo) y seleccione al menos una entrega para continuar.
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'preview' && masterCustomerList && (
                            <DispatchPreview
                                customers={masterCustomerList}
                                selectedDeliveries={selectedDeliveries}
                                formData={formData}
                                onBack={handleBackToEdit}
                                onFinalize={handleFinalizeAndReset}
                                generateAuditSheet={generateAuditSheet}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
